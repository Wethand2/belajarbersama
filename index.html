<!DOCTYPE html>
<html>
<head>
    <title>ESP32 RC Car</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #2c3e50; color: white; padding-top: 20px; }
        .container { max-width: 320px; margin: auto; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-gap: 15px; margin-top: 20px; }
        .btn { padding: 20px; font-size: 32px; color: white; border: 2px solid #7f8c8d; border-radius: 50%; cursor: pointer; user-select: none; }
        .btn:active { border-color: white; }
        .up { grid-column: 2; background-color: #27ae60; }
        .left { grid-column: 1; grid-row: 2; background-color: #2980b9; }
        .stop { grid-column: 2; grid-row: 2; background-color: #c0392b; font-size: 20px; }
        .right { grid-column: 3; grid-row: 2; background-color: #2980b9; }
        .down { grid-column: 2; grid-row: 3; background-color: #f39c12; }
        .spin-left { grid-column: 1; grid-row: 3; background-color: #8e44ad; font-size: 24px; }
        .spin-right { grid-column: 3; grid-row: 3; background-color: #8e44ad; font-size: 24px; }
        .slider-container { margin-top: 30px; }
        input[type=range] { width: 80%; height: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32 RC Car</h1>
        <div class="slider-container">
            <label for="speed">Speed</label>
            <input type="range" min="200" max="1023" value="512" id="speedSlider" oninput="sendSpeed(this.value)">
        </div>
        <div class="grid-container">
            <div></div><button class="btn up" onmousedown="sendCommand('/maju')" onmouseup="sendCommand('/berhenti')" ontouchstart="sendCommand('/maju')" ontouchend="sendCommand('/berhenti')">&#9650;</button><div></div>
            <button class="btn left" onmousedown="sendCommand('/kiri')" onmouseup="sendCommand('/berhenti')" ontouchstart="sendCommand('/kiri')" ontouchend="sendCommand('/berhenti')">&#9664;</button>
            <button class="btn stop" onclick="sendCommand('/berhenti')">STOP</button>
            <button class="btn right" onmousedown="sendCommand('/kanan')" onmouseup="sendCommand('/berhenti')" ontouchstart="sendCommand('/kanan')" ontouchend="sendCommand('/berhenti')">&#9654;</button>
            <button class="btn spin-left" onmousedown="sendCommand('/putar_kiri')" onmouseup="sendCommand('/berhenti')" ontouchstart="sendCommand('/putar_kiri')" ontouchend="sendCommand('/berhenti')">&#8634;</button>
            <button class="btn down" onmousedown="sendCommand('/mundur')" onmouseup="sendCommand('/berhenti')" ontouchstart="sendCommand('/mundur')" ontouchend="sendCommand('/berhenti')">&#9660;</button>
            <button class="btn spin-right" onmousedown="sendCommand('/putar_kanan')" onmouseup="sendCommand('/berhenti')" ontouchstart="sendCommand('/putar_kanan')" ontouchend="sendCommand('/berhenti')">&#8635;</button>
        </div>
    </div>
    <script>
        function sendCommand(path) {
            fetch(path).catch(err => console.error(err));
        }
        function sendSpeed(value) {
            fetch(`/speed?value=${value}`).catch(err => console.error(err));
        }
    </script>
</body>
</html>
